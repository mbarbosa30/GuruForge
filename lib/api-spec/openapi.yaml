openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: GuruForge API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: categories
    description: Category operations
  - name: gurus
    description: Guru operations
  - name: users
    description: User operations
  - name: ratings
    description: Rating operations
  - name: subscriptions
    description: Subscription operations
  - name: telegram
    description: Telegram connection operations
  - name: wisdom
    description: Wisdom feed and journal operations
  - name: feed
    description: Global wisdom feed operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
  /gurus:
    get:
      operationId: listGurus
      tags: [gurus]
      summary: List and search gurus
      parameters:
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category slug
        - name: status
          in: query
          schema:
            type: string
          description: Filter by status (default published)
        - name: search
          in: query
          schema:
            type: string
          description: Search by name, tagline, or description
        - name: sort
          in: query
          schema:
            type: string
            enum: [newest, wisdom, price_asc, price_desc, users]
          description: Sort order
      responses:
        "200":
          description: List of gurus
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GuruListItem"
    post:
      operationId: createGuru
      tags: [gurus]
      summary: Create a new guru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGuruInput"
      responses:
        "201":
          description: Guru created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guru"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /gurus/{slug}:
    get:
      operationId: getGuru
      tags: [gurus]
      summary: Get a guru by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Guru details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuruDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /gurus/{id}:
    patch:
      operationId: updateGuru
      tags: [gurus]
      summary: Update a guru
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGuruInput"
      responses:
        "200":
          description: Guru updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guru"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /gurus/{id}/ratings:
    get:
      operationId: listGuruRatings
      tags: [ratings]
      summary: Get ratings for a guru
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rating"
    post:
      operationId: createGuruRating
      tags: [ratings]
      summary: Rate a guru (creates or updates existing rating)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRatingInput"
      responses:
        "200":
          description: Rating updated (existing rating)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuruRating"
        "201":
          description: Rating created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GuruRating"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /subscriptions/checkout:
    post:
      operationId: createCheckoutSession
      tags: [subscriptions]
      summary: Create a Stripe checkout session for a Guru subscription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutInput"
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSession"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /subscriptions/me:
    get:
      operationId: listMySubscriptions
      tags: [subscriptions]
      summary: List current user's active subscriptions
      responses:
        "200":
          description: Active subscriptions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserSubscription"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /subscriptions/portal:
    post:
      operationId: createPortalSession
      tags: [subscriptions]
      summary: Create a Stripe billing portal session
      responses:
        "200":
          description: Portal session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalSession"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /subscriptions/check/{guruId}:
    get:
      operationId: checkSubscription
      tags: [subscriptions]
      summary: Check if user is subscribed to a guru
      parameters:
        - name: guruId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionCheck"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /telegram/connect/{guruId}:
    post:
      operationId: createTelegramConnection
      tags: [telegram]
      summary: Generate a Telegram connection code for a guru
      parameters:
        - name: guruId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Connection code or already connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramConnectionResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: No active subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /telegram/status/{guruId}:
    get:
      operationId: getTelegramStatus
      tags: [telegram]
      summary: Check Telegram connection status for a guru
      parameters:
        - name: guruId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Connection status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramStatusResponse"
  /telegram/wisdom-toggle/{guruId}:
    patch:
      operationId: toggleWisdomContribution
      tags: [telegram]
      summary: Toggle wisdom contribution for a Guru connection
      parameters:
        - name: guruId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WisdomToggleInput"
      responses:
        "200":
          description: Updated setting
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WisdomToggleResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No active connection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /gurus/{guruId}/contribution-score:
    get:
      operationId: getContributionScore
      tags: [gurus]
      summary: Get the current user's contribution score for a guru
      parameters:
        - name: guruId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contribution score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributionScoreResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /telegram/bot-info/{guruId}:
    get:
      operationId: getTelegramBotInfo
      tags: [telegram]
      summary: Get Telegram bot info for a guru
      parameters:
        - name: guruId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bot info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramBotInfoResponse"
  /telegram/bot-token/{guruId}:
    patch:
      operationId: updateTelegramBotToken
      tags: [telegram]
      summary: Set the Telegram bot token for a guru (creator only)
      parameters:
        - name: guruId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBotTokenInput"
      responses:
        "200":
          description: Bot token updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateBotTokenResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /feed:
    get:
      operationId: getGlobalFeed
      tags: [feed]
      summary: Get global wisdom feed across all Gurus
      parameters:
        - name: patternType
          in: query
          schema:
            type: string
          description: Filter by pattern type
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Global feed items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalFeedResponse"
  /gurus/{guruId}/wisdom-feed:
    get:
      operationId: getWisdomFeed
      tags: [wisdom]
      summary: Get personal wisdom feed for a guru
      parameters:
        - name: guruId
          in: path
          required: true
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
        - name: topic
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Wisdom feed entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WisdomFeedResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /gurus/{guruId}/journal:
    get:
      operationId: getGuruJournal
      tags: [wisdom]
      summary: Get public guru journal
      parameters:
        - name: guruId
          in: path
          required: true
          schema:
            type: integer
        - name: patternType
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Journal entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalResponse"
  /gurus/{guruId}/journal/my-votes:
    get:
      operationId: getJournalMyVotes
      tags: [wisdom]
      summary: Get current user votes on journal entries
      parameters:
        - name: guruId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User votes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalMyVotesResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /feedback:
    post:
      operationId: submitFeedback
      tags: [wisdom]
      summary: Submit thumbs up/down feedback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackInput"
      responses:
        "200":
          description: Feedback result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResult"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        displayOrder:
          type: integer
      required:
        - id
        - name
        - slug
        - displayOrder
    GuruListItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        tagline:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        categoryId:
          type: integer
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        status:
          type: string
        priceCents:
          type: integer
        priceInterval:
          type: string
        topics:
          type: array
          items:
            type: string
          nullable: true
        personalityStyle:
          type: string
          nullable: true
        modelTier:
          type: string
          enum: [grok, gpt]
          nullable: true
        wisdomScore:
          type: number
          nullable: true
        satisfactionScore:
          type: number
          nullable: true
        userCount:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        categoryName:
          type: string
          nullable: true
        categorySlug:
          type: string
          nullable: true
        creatorName:
          type: string
          nullable: true
      required:
        - id
        - name
        - slug
        - status
        - priceCents
        - priceInterval
        - createdAt
    GuruDetail:
      type: object
      properties:
        id:
          type: integer
        creatorId:
          type: integer
        name:
          type: string
        slug:
          type: string
        tagline:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        categoryId:
          type: integer
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        status:
          type: string
        priceCents:
          type: integer
        priceInterval:
          type: string
        topics:
          type: array
          items:
            type: string
          nullable: true
        personalityStyle:
          type: string
          nullable: true
        modelTier:
          type: string
          enum: [grok, gpt]
          nullable: true
        memoryPolicy:
          type: string
          nullable: true
        introEnabled:
          type: boolean
          nullable: true
        proactiveCadence:
          type: string
          enum: [off, daily, every_few_days, weekly]
          nullable: true
        isCreator:
          type: boolean
        wisdomScore:
          type: number
          nullable: true
        satisfactionScore:
          type: number
          nullable: true
        userCount:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        categoryName:
          type: string
          nullable: true
        categorySlug:
          type: string
          nullable: true
        creatorName:
          type: string
          nullable: true
        creatorAvatarUrl:
          type: string
          nullable: true
        avgRating:
          type: number
          nullable: true
        totalRatings:
          type: integer
      required:
        - id
        - creatorId
        - name
        - slug
        - status
        - priceCents
        - priceInterval
        - createdAt
        - totalRatings
    Guru:
      type: object
      properties:
        id:
          type: integer
        creatorId:
          type: integer
        name:
          type: string
        slug:
          type: string
        tagline:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        categoryId:
          type: integer
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        status:
          type: string
        priceCents:
          type: integer
        priceInterval:
          type: string
        topics:
          type: array
          items:
            type: string
          nullable: true
        personalityStyle:
          type: string
          nullable: true
        modelTier:
          type: string
          enum: [grok, gpt]
          nullable: true
        memoryPolicy:
          type: string
          nullable: true
        introEnabled:
          type: boolean
          nullable: true
        wisdomScore:
          type: number
          nullable: true
        satisfactionScore:
          type: number
          nullable: true
        userCount:
          type: integer
          nullable: true
        stripeProductId:
          type: string
          nullable: true
        stripePriceId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - creatorId
        - name
        - slug
        - status
        - priceCents
        - priceInterval
        - createdAt
        - updatedAt
    CreateGuruInput:
      type: object
      properties:
        name:
          type: string
        tagline:
          type: string
        description:
          type: string
        categoryId:
          type: integer
        avatarUrl:
          type: string
        priceCents:
          type: integer
        priceInterval:
          type: string
          enum: [monthly, yearly]
        topics:
          type: array
          items:
            type: string
        personalityStyle:
          type: string
          enum: [professional, friendly, direct, academic]
        modelTier:
          type: string
          enum: [grok, gpt]
        memoryPolicy:
          type: string
        introEnabled:
          type: boolean
        proactiveCadence:
          type: string
          enum: [off, daily, every_few_days, weekly]
      required:
        - name
    UpdateGuruInput:
      type: object
      properties:
        name:
          type: string
        tagline:
          type: string
        description:
          type: string
        categoryId:
          type: integer
        avatarUrl:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        priceCents:
          type: integer
        priceInterval:
          type: string
          enum: [monthly, yearly]
        topics:
          type: array
          items:
            type: string
        personalityStyle:
          type: string
          enum: [professional, friendly, direct, academic]
        modelTier:
          type: string
          enum: [grok, gpt]
        memoryPolicy:
          type: string
        introEnabled:
          type: boolean
        proactiveCadence:
          type: string
          enum: [off, daily, every_few_days, weekly]
        telegramBotToken:
          type: string
    User:
      type: object
      properties:
        id:
          type: integer
        privyId:
          type: string
        email:
          type: string
        name:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        walletAddress:
          type: string
          nullable: true
        role:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - privyId
        - email
        - role
        - createdAt
        - updatedAt
    UpdateUserInput:
      type: object
      properties:
        name:
          type: string
        avatarUrl:
          type: string
    Rating:
      type: object
      properties:
        id:
          type: integer
        rating:
          type: integer
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        userName:
          type: string
          nullable: true
        userAvatarUrl:
          type: string
          nullable: true
      required:
        - id
        - rating
        - createdAt
    GuruRating:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        guruId:
          type: integer
        rating:
          type: integer
        comment:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - guruId
        - rating
        - createdAt
    CreateRatingInput:
      type: object
      properties:
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
      required:
        - rating
    CheckoutInput:
      type: object
      properties:
        guruId:
          type: integer
      required:
        - guruId
    CheckoutSession:
      type: object
      properties:
        url:
          type: string
          nullable: true
      required:
        - url
    UserSubscription:
      type: object
      properties:
        id:
          type: integer
        guruId:
          type: integer
        status:
          type: string
        startedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true
        stripeSubscriptionId:
          type: string
          nullable: true
        guruName:
          type: string
        guruSlug:
